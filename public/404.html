<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, follow" />
  <title>페이지를 찾을 수 없습니다 — Unibirth</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07090f;
      color: rgba(255,255,255,0.78);
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      font-size: 15px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
    }
    .star { font-size: 40px; color: rgba(196,181,253,0.5); margin-bottom: 32px; letter-spacing: 0.4em; }
    h1 {
      font-family: Georgia, serif;
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 400;
      color: rgba(255,255,255,0.92);
      margin-bottom: 16px;
    }
    p {
      font-size: 15px;
      color: rgba(255,255,255,0.45);
      line-height: 1.75;
      max-width: 400px;
      margin-bottom: 40px;
    }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      border: 1px solid rgba(196,181,253,0.30);
      border-radius: 8px;
      color: rgba(196,181,253,0.85);
      text-decoration: none;
      font-size: 14px;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn:hover { background: rgba(196,181,253,0.10); border-color: rgba(196,181,253,0.50); }
  </style>
</head>
<body>
  <div class="star">✦ ✦ ✦</div>
  <h1>페이지를 찾을 수 없습니다</h1>
  <p>요청하신 페이지가 존재하지 않거나 이동되었습니다.<br>탄생별 찾기로 돌아가 볼까요?</p>
  <a href="/" class="btn">탄생별 찾기로 돌아가기 →</a>
</body>
</html>
